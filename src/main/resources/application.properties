spring.application.name=Online_Library_Management_System
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HSF_Library;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

#chỉnh sửa để upload file mặc đinh là 1MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
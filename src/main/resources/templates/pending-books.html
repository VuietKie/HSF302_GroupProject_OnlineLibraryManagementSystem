<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Approve New Books</title>
    <!-- Simple Bootstrap 5 for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Pending Books Approval</h2>
    <div th:if="${#lists.isEmpty(pendingBooks)}" class="alert alert-info">
        There are no pending books to approve.
    </div>
    <div th:if="${not #lists.isEmpty(pendingBooks)}">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${pendingBooks}">
                    <td th:text="${book.bookId}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.description}"></td>
                    <td>
                        <form th:action="@{/admin/books/approve/{id}(id=${book.bookId})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-success btn-sm">Approve</button>
                        </form>
                        <form th:action="@{/admin/books/reject/{id}(id=${book.bookId})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm">Reject</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow p-4" style="width: 440px;">
        <h3 class="text-center mb-4">Đổi mật khẩu</h3>

        <div class="alert alert-success" th:if="${param.success}">
            Đổi mật khẩu thành công.
        </div>

        <form th:action="@{/change-password}" th:object="${request}" method="post">
            <div class="mb-3">
                <label class="form-label">Mật khẩu hiện tại</label>
                <input type="password"
                       th:field="*{currentPassword}"
                       class="form-control"
                       placeholder="Nhập mật khẩu hiện tại">
                <div class="text-danger"
                     th:if="${#fields.hasErrors('currentPassword')}"
                     th:errors="*{currentPassword}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu mới</label>
                <input type="password"
                       th:field="*{newPassword}"
                       class="form-control"
                       placeholder="Nhập mật khẩu mới">
                <div class="text-danger"
                     th:if="${#fields.hasErrors('newPassword')}"
                     th:errors="*{newPassword}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu mới</label>
                <input type="password"
                       th:field="*{confirmPassword}"
                       class="form-control"
                       placeholder="Nhập lại mật khẩu mới">
                <div class="text-danger"
                     th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Lưu mật khẩu mới
            </button>
            <a th:href="@{/homepage}" class="btn btn-link w-100 mt-2">Quay lại trang chủ</a>
        </form>
    </div>
</div>
</body>
</html>

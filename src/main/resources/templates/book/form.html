<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle}">Form sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="card shadow p-4" style="max-width: 640px;">
        <h3 class="mb-4" th:text="${formTitle}">Form sách</h3>
        <form th:action="@{${actionUrl}}" th:object="${book}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-labe">Tên sách</label>
                <input type="text" th:field="*{title}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea type="text" th:field="*{description}" class="form-control" rows="3">
                </textarea>
                <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Số lượng</label>
                <input type="number" th:field="*{totalCopies}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('totalCopies')}" th:errors="*{totalCopies}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" class="form-select">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tác giả( giữ Ctrl để chọn nhiều)</label>
                <select th:field="*{authorIds}" class="form-select" multiple size="4">
                    <option th:each="author : ${allAuthors}" th:value="${author.authorId}" th:text="${author.name}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Thể loại( giữ Ctrl để chọn nhiều)</label>
                <select th:field="*{categoryIds}" class="form-select" multiple size="4">
                    <option th:each="category : ${allCategories}" th:value="${category.categoryId}" th:text="${category.categoryName}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Ảnh bìa</label>
                <input type="file" name="coverFile" class="form-control" accept="image/*">
                <div th:if="${book.coverImg!=null}" class="mt-2">
                    <small class="text-muted">Ảnh hiện tại: </small><br>
                    <img th:src="@{${book.coverImg}}" width="80" alt="cover">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/admin/books}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>

</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phê duyệt sách mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">UC10: Phê duyệt sách mới</h2>
            <p class="text-muted mb-0">Các sách ở trạng thái <b>INACTIVE</b> có thể được chuyển sang <b>ACTIVE</b>.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin/manager}">← Quay lại trang admin</a>
    </div>

    <div th:if="${#lists.isEmpty(pendingBooks)}" class="alert alert-info">
        Không có sách nào ở trạng thái INACTIVE để phê duyệt.
    </div>

    <table th:if="${not #lists.isEmpty(pendingBooks)}" class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
            <tr>
                <th>Ảnh</th>
                <th>Tên sách</th>
                <th>Tác giả</th>
                <th>Thể loại</th>
                <th>Mô tả</th>
                <th>Trạng thái hiện tại</th>
                <th style="width: 220px;">Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${pendingBooks}">
                <td>
                    <img th:if="${book.coverImg != null}" th:src="@{${book.coverImg}}" width="50" alt="cover">
                    <span th:if="${book.coverImg == null}">-</span>
                </td>
                <td th:text="${book.title}"></td>
                <td>
                    <span th:each="a, it : ${book.authors}" th:text="${a.name + (it.last ? '' : ', ')}"></span>
                </td>
                <td>
                    <span th:each="c, it : ${book.categories}" th:text="${c.categoryName + (it.last ? '' : ', ')}"></span>
                </td>
                <td th:text="${book.description}"></td>
                <td>
                    <span class="badge bg-secondary" th:text="${book.status}">INACTIVE</span>
                </td>
                <td>
                    <form th:action="@{/admin/books/approve/{id}(id=${book.bookId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-success"
                                onclick="return confirm('Chuyển trạng thái sách từ INACTIVE sang ACTIVE?')">
                            Chuyển sang ACTIVE
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>

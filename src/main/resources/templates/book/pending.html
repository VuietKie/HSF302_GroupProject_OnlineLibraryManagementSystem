<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phê duyệt sách mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Phê duyệt sách mới</h2>
        <a class="btn btn-outline-secondary" th:href="@{/admin/books}">← Quay lại danh sách sách</a>
    </div>

    <div th:if="${#lists.isEmpty(pendingBooks)}" class="alert alert-info">
        Không có sách nào đang chờ phê duyệt.
    </div>

    <table th:if="${not #lists.isEmpty(pendingBooks)}" class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
            <tr>
                <th>Ảnh</th>
                <th>Tên sách</th>
                <th>Tác giả</th>
                <th>Thể loại</th>
                <th>Mô tả</th>
                <th style="width: 200px;">Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${pendingBooks}">
                <td>
                    <img th:if="${book.coverImg != null}" th:src="@{${book.coverImg}}" width="50" alt="cover">
                    <span th:if="${book.coverImg == null}">-</span>
                </td>
                <td th:text="${book.title}"></td>
                <td>
                    <span th:each="a, it : ${book.authors}" th:text="${a.name + (it.last ? '' : ', ')}"></span>
                </td>
                <td>
                    <span th:each="c, it : ${book.categories}" th:text="${c.categoryName + (it.last ? '' : ', ')}"></span>
                </td>
                <td th:text="${book.description}"></td>
                <td>
                    <form th:action="@{/admin/books/approve/{id}(id=${book.bookId})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-success">✔ Phê duyệt</button>
                    </form>
                    <form th:action="@{/admin/books/reject/{id}(id=${book.bookId})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Bạn có chắc chắn muốn từ chối sách này không?')">
                            ✘ Từ chối
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>

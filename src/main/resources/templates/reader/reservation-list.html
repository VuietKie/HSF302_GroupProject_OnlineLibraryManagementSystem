<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reservation của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; }
        .content-card { border: 0; border-radius: 18px; }
    </style>
</head>
<body>
<main class="container py-5" style="max-width: 1000px">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <a class="text-decoration-none" th:href="@{/reader/books}">&larr; ViewBook</a>
            <h1 class="h3 mt-2 mb-0">Reservation của tôi</h1>
        </div>
        <a class="btn btn-primary" th:href="@{/reader/reservations/new}">Tạo mới</a>
    </div>
    <div class="card content-card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Mã</th>
                    <th>Ngày tạo</th>
                    <th>Hết hạn giữ</th>
                    <th>Trạng thái</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reservation : ${reservations}">
                    <td th:text="|#${reservation.reservationId}|">#1</td>
                    <td th:text="${#temporals.format(reservation.reservedAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span th:if="${reservation.expiredAt != null}"
                              th:text="${#temporals.format(reservation.expiredAt, 'dd/MM/yyyy HH:mm')}"></span>
                        <span class="text-success" th:if="${reservation.expiredAt == null}">Không giới hạn</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${reservation.status.name() == 'HOLDING'} ? 'bg-warning text-dark' :
                                (${reservation.status.name() == 'WAITING_FOR_APPROVAL'} ? 'bg-info text-dark' :
                                (${reservation.status.name() == 'EXPIRED'} ? 'bg-secondary' : 'bg-primary'))"
                              th:text="${reservation.status}">HOLDING</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/reader/reservations/{id}(id=${reservation.reservationId})}">Chi tiết</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reservations)}">
                    <td colspan="5" class="text-center text-muted py-5">Bạn chưa có reservation nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>

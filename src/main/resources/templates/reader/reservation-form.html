<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tạo reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; }
        .form-card { border: 0; border-radius: 18px; }
        .book-thumb { width: 58px; height: 76px; object-fit: cover; border-radius: 8px; background: #e9ecef; }
        .quantity { max-width: 110px; }
    </style>
</head>
<body>
<main class="container py-5" style="max-width: 950px">
    <div class="mb-4">
        <a class="text-decoration-none" th:href="@{/reader/books}">&larr; Quay lại ViewBook</a>
        <h1 class="h3 mt-3">Tạo reservation</h1>
        <p class="text-muted">Nhập số lượng cho các sách muốn giữ. Sách sẽ được giữ trong 2 giờ.</p>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="card form-card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/reader/reservations}" th:object="${reservationRequest}" method="post">
                <div class="table-responsive" th:if="${!#lists.isEmpty(books)}">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Sách</th>
                            <th class="text-center">Có sẵn</th>
                            <th style="width: 150px">Số lượng giữ</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="book, stat : ${books}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img class="book-thumb" th:if="${book.coverImg != null}"
                                         th:src="@{${book.coverImg}}" alt="">
                                    <div class="book-thumb d-grid align-items-center text-center small text-muted"
                                         th:if="${book.coverImg == null}">No cover</div>
                                    <div>
                                        <strong th:text="${book.title}">Tên sách</strong>
                                        <div class="small text-muted" th:text="${book.description}"></div>
                                    </div>
                                </div>
                                <input type="hidden" th:field="*{items[__${stat.index}__].bookId}">
                            </td>
                            <td class="text-center">
                                <span class="badge bg-success" th:text="${book.availableCopies}">0</span>
                            </td>
                            <td>
                                <input class="form-control quantity" type="number" min="0"
                                       th:max="${book.availableCopies}"
                                       th:field="*{items[__${stat.index}__].quantity}">
                                <div class="text-danger small"
                                     th:errors="*{items[__${stat.index}__].quantity}"></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="alert alert-warning" th:if="${#lists.isEmpty(books)}">
                    Hiện không có sách khả dụng để đặt trước.
                </div>
                <div class="d-flex justify-content-end gap-2 mt-3">
                    <a class="btn btn-light" th:href="@{/reader/books}">Hủy</a>
                    <button class="btn btn-primary px-4" type="submit"
                            th:disabled="${#lists.isEmpty(books)}">Giữ sách</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>

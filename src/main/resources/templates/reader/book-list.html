<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thư viện sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; }
        .book-card { border: 0; border-radius: 16px; overflow: hidden; transition: .2s ease; }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(31,45,61,.12)!important; }
        .cover { height: 260px; object-fit: cover; background: #e9ecef; }
        .cover-empty { height: 260px; display: grid; place-items: center; background: #e9ecef; color: #6c757d; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/homepage}">Online Library</a>
        <a class="btn btn-light btn-sm" th:href="@{/reader/reservations}">Reservation của tôi</a>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Khám phá sách</h1>
            <p class="text-muted mb-0">Chọn sách để tạo reservation, bạn có thể thêm nhiều đầu sách cùng lúc.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/reader/reservations/new}">Tạo reservation</a>
    </div>

    <div class="row g-4">
        <div class="col-sm-6 col-lg-4 col-xl-3" th:each="book : ${books}">
            <div class="card book-card shadow-sm h-100">
                <img th:if="${book.coverImg != null}" class="cover card-img-top"
                     th:src="@{${book.coverImg}}" th:alt="${book.title}">
                <div th:if="${book.coverImg == null}" class="cover-empty">Chưa có ảnh bìa</div>
                <div class="card-body d-flex flex-column">
                    <h2 class="h5 card-title" th:text="${book.title}">Tên sách</h2>
                    <p class="small text-muted text-truncate" th:text="${book.description}">Mô tả</p>
                    <div class="mt-auto">
                        <span class="badge bg-success mb-3"
                              th:if="${book.availableCopies > 0}"
                              th:text="|Còn ${book.availableCopies}/${book.totalCopies}|">Còn sách</span>
                        <span class="badge bg-secondary mb-3"
                              th:if="${book.availableCopies <= 0}">Đã hết sách</span>
                        <div>
                            <a class="btn btn-outline-primary w-100"
                               th:if="${book.availableCopies > 0}"
                               th:href="@{/reader/reservations/new(bookId=${book.bookId})}">Chọn đặt trước</a>
                            <button class="btn btn-outline-secondary w-100" disabled
                                    th:if="${book.availableCopies <= 0}">Tạm hết</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="alert alert-info text-center" th:if="${#lists.isEmpty(books)}">
        Hiện chưa có sách nào đang hoạt động.
    </div>
</main>
</body>
</html>

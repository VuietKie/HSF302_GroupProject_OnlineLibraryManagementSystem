<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle}">Form thể loại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="card shadow p-4" style="max-width: 480px;">
        <h3 class="mb-4" th:text="${formTitle}">Thể loại</h3>
        <form th:action="@{${actionUrl}}" th:object="${category}" method="post">
            <div class="mb-3">
                <label class="form-label">Tên thể loại</label>
                <input type="text" th:field="*{categoryName}" class="form-control">
                <div class="text-danger"
                     th:if="${#fields.hasErrors('categoryName')}"
                     th:errors="*{categoryName}">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/admin/categories}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</body>
</html>

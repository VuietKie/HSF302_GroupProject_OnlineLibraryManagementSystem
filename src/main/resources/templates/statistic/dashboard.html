<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thống kê mượn sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <h2 class="mb-3">Thống kê mượn sách</h2>

    <!-- Thẻ tổng số lượt mượn -->
    <div class="card text-center mb-4" style="max-width: 240px;">
        <div class="card-body">
            <h6 class="card-subtitle mb-2 text-muted">Tổng lượt mượn</h6>
            <p class="card-text fs-3" th:text="${totalBorrows}">0</p>
        </div>
    </div>

    <div class="row">
        <!-- Thống kê theo trạng thái -->
        <div class="col-md-6">
            <h5>Theo trạng thái</h5>
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Trạng thái</th>
                        <th>Số lượt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${statusCounts}">
                        <td th:text="${row[0]}"></td>
                        <td th:text="${row[1]}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(statusCounts)}">
                        <td colspan="2" class="text-center text-muted">Chưa có dữ liệu.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Thống kê theo tháng -->
        <div class="col-md-6">
            <h5>Theo tháng</h5>
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Tháng</th>
                        <th>Số lượt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${monthCounts}">
                        <td th:text="${row[0]}"></td>
                        <td th:text="${row[1]}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(monthCounts)}">
                        <td colspan="2" class="text-center text-muted">Chưa có dữ liệu.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a th:href="@{/homepage}">Về trang chủ</a>
</body>
</html>

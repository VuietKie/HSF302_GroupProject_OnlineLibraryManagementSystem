<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #eef3fb;
        }
        .hero-panel {
            border: 0;
            border-radius: 24px;
            background:
                    radial-gradient(circle at top right, rgba(255,255,255,.24), transparent 28%),
                    linear-gradient(135deg, #123a7d, #266de8 58%, #5ca8ff);
            color: #fff;
            overflow: hidden;
        }
        .feature-card {
            border: 0;
            border-radius: 20px;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(18,58,125,.12) !important;
        }
        .feature-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }
        .icon-warning {
            background: #fff3cd;
            color: #996c00;
        }
        .icon-dark {
            background: #dfe7ff;
            color: #1f3f86;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">Online Library Admin</span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button class="btn btn-light btn-sm">Đăng xuất</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <section class="card hero-panel shadow-lg mb-4">
        <div class="card-body p-4 p-md-5">
            <div class="row align-items-center g-4">
                <div class="col-lg-8">
                    <div class="d-flex flex-wrap gap-2 mt-4" th:if="${isAdmin}">
                        <a class="btn btn-light text-dark fw-semibold px-4" th:href="@{/admin/statistics}">UC12: Thống kê mượn sách</a>
                        <a class="btn btn-light text-dark fw-semibold px-4" th:href="@{/admin/books/pending}">UC10: Phê duyệt sách mới</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    </div>
</main>
</body>
</html>

<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <h2>
        Xin chào, <span th:text="${email}">user</span>
    </h2>
    <p>Quyền của bạn: <b th:text="${role}">[Role]</b></p>
    <hr>

    <a class="btn btn-outline-primary" th:if="${#strings.contains(role.toString(), 'ROLE_READER')}"
       th:href="@{/reader/books}">Tìm kiếm sách (UC02)</a>

    <a class="btn btn-outline-primary" th:if="${#strings.contains(role.toString(), 'ROLE_ADMIN')}"
       th:href="@{/admin/categories}">Quản lý thể loại (UC09)</a>

    <a class="btn btn-outline-primary" th:if="${#strings.contains(role.toString(), 'ROLE_ADMIN')}"
       th:href="@{/admin/books}">Quản lý thể sách (UC08)</a>

    <a class="btn btn-outline-warning" th:if="${#strings.contains(role.toString(), 'ROLE_ADMIN')}"
       th:href="@{/admin/books/pending}">Phê duyệt sách mới (UC10)</a>

    <a class="btn btn-outline-dark" th:if="${#strings.contains(role.toString(), 'ROLE_ADMIN')}"
       th:href="@{/admin/statistics}">Thống kê mượn sách (UC12)</a>

    <a class="btn btn-outline-primary" th:if="${#strings.contains(role.toString(), 'ROLE_LIBRARIAN')}"
       th:href="@{/librarian/returns}">Ghi nhận trả sách (UC07)</a>

    <a class="btn btn-outline-primary" th:if="${#strings.contains(role.toString(), 'ROLE_LIBRARIAN')}"
       th:href="@{/librarian/reservations}">Reservation chờ phê duyệt</a>

    <a class="btn btn-outline-success" th:if="${#strings.contains(role.toString(), 'ROLE_READER')}"
       th:href="@{/reader/books}">Xem sách và đặt trước</a>

    <a class="btn btn-outline-success" th:if="${#strings.contains(role.toString(), 'ROLE_READER')}"
       th:href="@{/reader/borrow-history}">Lịch sử mượn sách (UC05)</a>

    <a class="btn btn-outline-secondary" th:href="@{/change-password}">Đổi mật khẩu</a>

    <form th:action="@{/logout}" method="post" class="mt-4">
        <button class="btn btn-danger">Đăng xuất</button>
    </form>
</body>
</html>

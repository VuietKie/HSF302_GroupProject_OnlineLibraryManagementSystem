<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <h2>
        Xin chào, <span th:text="${email}">user</span>
    </h2>
    <p>Quyền của bạn: <b th:text="${role}">[Role]</b></p>
    <hr>
    <a class="btn btn-outline-primary" href="/admin/categories">Quản lý thể loại(UC09)</a>
    <a class="btn btn-outline-primary" href="/admin/books">Quản lý thể sách(UC08)</a>
    <a class="btn btn-outline-primary" href="/librarian/returns">Ghi nhận trả sách (UC07)</a>
    <a class="btn btn-outline-success" th:if="${#strings.contains(role.toString(), 'ROLE_READER')}"
       th:href="@{/reader/books}">Xem sách và đặt trước</a>
    <form th:action="@{/logout}" method="post" class="mt-4">
        <button class="btn btn-danger">Đăng xuất</button>
    </form>
</body>
</html>

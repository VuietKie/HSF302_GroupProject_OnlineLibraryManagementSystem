<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${status != null ? status + ' - Error' : 'Error'}">Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <section class="card shadow-sm border-0" style="max-width: 560px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-muted mb-2">HTTP status</div>
            <h1 class="display-4 fw-bold mb-3" th:text="${status ?: 500}">500</h1>

            <h2 class="mb-3" th:text="${error ?: 'Internal Server Error'}">Internal Server Error</h2>

            <p class="text-danger mb-3"
               th:if="${message}"
               th:text="${message}">
                Something went wrong.
            </p>

            <a class="btn btn-primary" th:href="@{/homepage}">Back to homepage</a>
        </div>
    </section>
</main>
</body>
</html>
